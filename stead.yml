# jano stead manifest — OpenAI-compatible queue + router that fronts the
# brain stead's two llama.cpp backends. Greedy-batches concurrent requests
# so a flurry of mixed model calls costs one swap, not many.
#
# Public repo: https://github.com/a7t-ai/jano (private until v1.0).
#
# Jano depends on brain at runtime: SWAP_COMMAND in .env points at
# ~/steads/brain/bin/brain-llm, which jano shells out to whenever the
# queue requires loading a different model. Bring brain up first.

kind: stead/env-v1
name: jano
description: Tiny OpenAI-compatible router for two-or-more local LLMs that can't all fit in unified memory. Calls a user-supplied swap script; greedy-batches the queue to minimise swaps.

runtimes:
  node: 23.6.0

services:
  jano:
    type: node
    workdir: ./
    cmd: node --experimental-strip-types src/index.ts
    runtime: node@23.6.0
    # No env_file: jano loads ./.env itself via dotenv in src/config.ts.
    # env_file is declared when the wrapper must source it before exec.
    port: 8082
    expose: tailscale # binds 0.0.0.0; tailnet provides secure routing
    depends_on:
      - brain # peer stead; SWAP_COMMAND invokes ~/steads/brain/bin/brain-llm
    log:
      stdout: ./logs/jano.out.log
      stderr: ./logs/jano.err.log

logs:
  base: ./logs
  rotation:
    schedule: daily
    keep_days: 14
    compress: true
    strategy: copytruncate
